<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>West Bengal Assembly Booth Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>West Bengal Assembly Booth Details</h1>
    <p class="subtitle">
      Select a District, Assembly, Panchayat, Municipality or Ward to view booth-level results.
    </p>
  </header>

  <section class="filters">

    <label>
      District
      <select id="districtSelect"></select>
    </label>

    <label>
      Assembly
      <select id="assemblySelect"></select>
    </label>

    <label>
      Filter Type
      <select id="modeSelect">
        <option value="all">Full Assembly</option>
        <option value="panchayat">Panchayat / GP</option>
        <option value="municipality">Municipality / Ward</option>
      </select>
    </label>

    <label>
      Show
      <select id="valueViewSelect">
        <option value="actual">Actual Votes</option>
        <option value="percent">Percentage Votes</option>
      </select>
    </label>

    <label>
      Party
      <select id="partySelect">
        <option value="">All Parties</option>
      </select>
    </label>

   <label>
     Filter By
     <select id="partyFilterType">
       <option value="percent">Percentage Range</option>
       <option value="rank">Rank</option>
     </select>
   </label>

    <label id="minPercentBox">
      Min %
      <input id="minPercentInput" type="number" min="0" max="100" step="1" placeholder="0">
    </label>
    
    <label id="maxPercentBox">
      Max %
      <input id="maxPercentInput" type="number" min="0" max="100" step="1" placeholder="100">
    </label>

    <label id="rankBox" style="display:none;">
      Rank
      <select id="rankInput">
        <option value="1">1st</option>
        <option value="2">2nd</option>
        <option value="3">3rd</option>
        <option value="4">4th</option>
        <option value="5">5th</option>
      </select>
    </label>

    <label id="panchayatBox">
      Panchayat / GP
      <select id="panchayatSelect"></select>
    </label>

    <label id="municipalityBox">
      Municipality
      <select id="municipalitySelect"></select>
    </label>

    <label id="wardBox">
      Ward
      <select id="wardSelect"></select>
    </label>

  </section>

  <section class="assembly-title">
    <h2 id="loadedAssemblyTitle">Assembly not loaded</h2>
  </section>

  <section class="summary">
    <p id="resultCount">Loading...</p>
  </section>

  <div class="top-scroll" id="topScroll">
    <div class="top-scroll-inner" id="topScrollInner"></div>
  </div>

  <section class="table-wrapper" id="tableWrapper">
    <table id="boothTable"></table>
  </section>

  <script src="app.js"></script>
</body>
</html>
